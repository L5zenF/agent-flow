id = "select-model"
name = "Select Model"
version = "0.1.0"
description = "Selects a provider and model for downstream proxying."
supported_output_ports = ["default"]
capabilities = ["log"]

[ui]
icon = "database"
category = "routing"
tone = "sky"
order = 55
tags = ["routing", "model"]

[default_config_schema_hints]
provider_id = "Provider id to select."
model_id = "Model id to select."
log_message = "Optional template log line."

[config_schema]
version = 1

[[config_schema.fields]]
key = "provider_id"
label = "Provider"
type = "select"
required = true
data_source = "providers"

[[config_schema.fields]]
key = "model_id"
label = "Model"
type = "select"
required = true
data_source = "models"
depends_on = "provider_id"

[[config_schema.fields]]
key = "log_message"
label = "Log Message"
type = "textarea"
placeholder = "selected provider=${ctx.selection.provider_id}"
