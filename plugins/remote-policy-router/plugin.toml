id = "remote-policy-router"
name = "Remote Policy Router"
version = "0.1.0"
description = "Routes requests with local fallback policy and optional remote policy overrides."
supported_output_ports = ["chat", "embedding", "moderation", "default", "error"]
capabilities = ["log", "fs", "network"]

[default_config_schema_hints]
policy_file = "Guest path to a local JSON policy file inside a granted read directory, for example /plugins/remote-policy-router/examples/local-policy.json."
policy_url = "Optional http://host:port/path endpoint returning a JSON policy document."
match_header = "Header used as the primary routing key, for example x-tenant."
fallback_port = "Port to use when no rule matches or policy loading fails."
