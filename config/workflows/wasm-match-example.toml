[workflow]
version = 1
start_node_id = "start"

[[workflow.nodes]]
id = "start"
type = "start"

[workflow.nodes.position]
x = 40.0
y = 220.0

[[workflow.nodes]]
id = "note-1"
type = "note"

[workflow.nodes.position]
x = 280.0
y = -20.0

[workflow.nodes.note_node]
text = """
示例说明：
1. wasm_match 会按顺序执行每个 branch
2. 每个 branch 都有自己的 expr
3. wasm 插件对当前 expr 求值，返回 match 表示命中
4. 第一个命中的 branch 会跳到对应 target
5. 没有命中则走 fallback
"""

[[workflow.nodes]]
id = "wasm-match-1"
type = "wasm_match"

[workflow.nodes.position]
x = 320.0
y = 210.0

[workflow.nodes.wasm_match]
plugin_id = "wasm-match-demo"
timeout_ms = 20
max_memory_bytes = 16777216
granted_capabilities = ["log"]
read_dirs = []
write_dirs = []
allowed_hosts = []
fallback_node_id = "provider-default"

[[workflow.nodes.wasm_match.branches]]
id = "chat"
expr = 'ctx.header.x-target == "chat"'
target_node_id = "provider-chat"

[[workflow.nodes.wasm_match.branches]]
id = "embedding"
expr = 'ctx.header.x-target == "embedding"'
target_node_id = "provider-embedding"

[workflow.nodes.wasm_match.config]
note = "Returns next_port=match when the current branch expr evaluates true."

[[workflow.nodes]]
id = "provider-chat"
type = "route_provider"

[workflow.nodes.position]
x = 760.0
y = 40.0

[workflow.nodes.route_provider]
provider_id = "kimi"

[[workflow.nodes]]
id = "provider-embedding"
type = "route_provider"

[workflow.nodes.position]
x = 760.0
y = 230.0

[workflow.nodes.route_provider]
provider_id = "kimi"

[[workflow.nodes]]
id = "provider-default"
type = "route_provider"

[workflow.nodes.position]
x = 760.0
y = 430.0

[workflow.nodes.route_provider]
provider_id = "kimi"

[[workflow.nodes]]
id = "rewrite-path"
type = "rewrite_path"

[workflow.nodes.position]
x = 980.0
y = 240.0

[workflow.nodes.rewrite_path]
value = "/coding/v1/chat/completions"

[[workflow.nodes]]
id = "end"
type = "end"

[workflow.nodes.position]
x = 1120.0
y = 240.0

[[workflow.edges]]
id = "start-next"
source = "start"
target = "wasm-match-1"

[[workflow.edges]]
id = "wasm-match-1-wasm_match:chat"
source = "wasm-match-1"
source_handle = "wasm_match:chat"
target = "provider-chat"

[[workflow.edges]]
id = "wasm-match-1-wasm_match:embedding"
source = "wasm-match-1"
source_handle = "wasm_match:embedding"
target = "provider-embedding"

[[workflow.edges]]
id = "wasm-match-1-wasm_match:fallback"
source = "wasm-match-1"
source_handle = "wasm_match:fallback"
target = "provider-default"

[[workflow.edges]]
id = "provider-chat-next"
source = "provider-chat"
target = "rewrite-path"

[[workflow.edges]]
id = "provider-embedding-next"
source = "provider-embedding"
target = "rewrite-path"

[[workflow.edges]]
id = "provider-default-next"
source = "provider-default"
target = "rewrite-path"

[[workflow.edges]]
id = "rewrite-path-next"
source = "rewrite-path"
target = "end"
