[workflow]
version = 1
start_node_id = "start"

[[workflow.nodes]]
id = "start"
type = "start"

[workflow.nodes.position]
x = 80.0
y = 180.0

[[workflow.nodes]]
id = "match-1"
type = "match"

[workflow.nodes.position]
x = 280.0
y = 180.0

[workflow.nodes.match]
plugin_id = "match-evaluator"
timeout_ms = 250
max_memory_bytes = 16777216
granted_capabilities = ["log"]
fallback_node_id = "fallback-provider"

[[workflow.nodes.match.branches]]
id = "chat-api"
expr = 'method == "POST" && path == "/v1/chat/completions"'
target_node_id = "select-chat-model"

[[workflow.nodes.match.branches]]
id = "legacy-chat"
expr = 'method == "POST" && path == "/chat"'
target_node_id = "rewrite-legacy-chat"

[[workflow.nodes]]
id = "rewrite-legacy-chat"
type = "rewrite_path"

[workflow.nodes.position]
x = 560.0
y = 320.0

[workflow.nodes.rewrite_path]
value = "/v1/chat/completions"

[[workflow.nodes]]
id = "select-chat-model"
type = "select_model"

[workflow.nodes.position]
x = 560.0
y = 120.0

[workflow.nodes.select_model]
provider_id = "kimi"
model_id = "kimi-k2"

[[workflow.nodes]]
id = "fallback-provider"
type = "route_provider"

[workflow.nodes.position]
x = 560.0
y = 520.0

[workflow.nodes.route_provider]
provider_id = "kimi"

[[workflow.nodes]]
id = "tag-route"
type = "set_header"

[workflow.nodes.position]
x = 860.0
y = 180.0

[workflow.nodes.set_header]
name = "x-route-engine"
value = "match"

[[workflow.nodes]]
id = "log-summary"
type = "log"

[workflow.nodes.position]
x = 1120.0
y = 180.0

[workflow.nodes.log]
message = "matched=${ctx.match.last_branch} result=${ctx.match.last_result} path=${ctx.path}"

[[workflow.nodes]]
id = "end"
type = "end"

[workflow.nodes.position]
x = 1360.0
y = 180.0

[[workflow.edges]]
id = "start-next"
source = "start"
target = "match-1"

[[workflow.edges]]
id = "match-1-chat-api"
source = "match-1"
target = "select-chat-model"
source_handle = "match:chat-api"

[[workflow.edges]]
id = "match-1-legacy-chat"
source = "match-1"
target = "rewrite-legacy-chat"
source_handle = "match:legacy-chat"

[[workflow.edges]]
id = "match-1-fallback"
source = "match-1"
target = "fallback-provider"
source_handle = "match:fallback"

[[workflow.edges]]
id = "rewrite-legacy-chat-next"
source = "rewrite-legacy-chat"
target = "select-chat-model"

[[workflow.edges]]
id = "select-chat-model-next"
source = "select-chat-model"
target = "tag-route"

[[workflow.edges]]
id = "fallback-provider-next"
source = "fallback-provider"
target = "tag-route"

[[workflow.edges]]
id = "tag-route-next"
source = "tag-route"
target = "log-summary"

[[workflow.edges]]
id = "log-summary-next"
source = "log-summary"
target = "end"
