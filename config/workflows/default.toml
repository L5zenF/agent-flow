[workflow]
version = 1
start_node_id = "start"

[[workflow.nodes]]
id = "start"
type = "start"

[workflow.nodes.position]
x = 80.0
y = 180.0

[[workflow.nodes]]
id = "match-1"
type = "match"

[workflow.nodes.position]
x = 280.0
y = 180.0

[workflow.nodes.match]
plugin_id = "match-evaluator"
timeout_ms = 250
max_memory_bytes = 16777216
granted_capabilities = ["log"]
fallback_node_id = "fallback-provider"

[[workflow.nodes.match.branches]]
id = "chat-api"
expr = 'method == "POST" && path == "/v1/chat/completions"'
target_node_id = "select-chat-model"

[[workflow.nodes.match.branches]]
id = "legacy-chat"
expr = 'method == "POST" && path == "/chat"'
target_node_id = "legacy-transform"

[[workflow.nodes]]
id = "legacy-transform"
type = "wasm_plugin"

[workflow.nodes.position]
x = 560.0
y = 320.0

[workflow.nodes.wasm_plugin]
plugin_id = "workflow-transform"
timeout_ms = 250
max_memory_bytes = 16777216
granted_capabilities = ["log"]

[workflow.nodes.wasm_plugin.config]
path_rewrite = "/v1/chat/completions"
log_message = "normalized legacy chat path from ${path}"

[[workflow.nodes]]
id = "select-chat-model"
type = "wasm_plugin"

[workflow.nodes.position]
x = 560.0
y = 120.0

[workflow.nodes.wasm_plugin]
plugin_id = "select-model"
timeout_ms = 250
max_memory_bytes = 16777216
granted_capabilities = ["log"]

[workflow.nodes.wasm_plugin.config]
provider_id = "kimi"
model_id = "kimi-k2"

[[workflow.nodes]]
id = "fallback-provider"
type = "wasm_plugin"

[workflow.nodes.position]
x = 560.0
y = 520.0

[workflow.nodes.wasm_plugin]
plugin_id = "route-provider"
timeout_ms = 250
max_memory_bytes = 16777216
granted_capabilities = ["log"]

[workflow.nodes.wasm_plugin.config]
provider_id = "kimi"

[[workflow.nodes]]
id = "finalize-response"
type = "wasm_plugin"

[workflow.nodes.position]
x = 860.0
y = 180.0

[workflow.nodes.wasm_plugin]
plugin_id = "workflow-transform"
timeout_ms = 250
max_memory_bytes = 16777216
granted_capabilities = ["log"]

[[workflow.nodes.wasm_plugin.config.set_headers]]
op = "set"
name = "x-route-engine"
value = "match"

[workflow.nodes.wasm_plugin.config]
log_message = "matched=${ctx.match.last_branch} result=${ctx.match.last_result} path=${path}"

[[workflow.nodes]]
id = "end"
type = "end"

[workflow.nodes.position]
x = 1160.0
y = 180.0

[[workflow.edges]]
id = "start-next"
source = "start"
target = "match-1"

[[workflow.edges]]
id = "match-1-chat-api"
source = "match-1"
target = "select-chat-model"
source_handle = "match:chat-api"

[[workflow.edges]]
id = "match-1-legacy-chat"
source = "match-1"
target = "legacy-transform"
source_handle = "match:legacy-chat"

[[workflow.edges]]
id = "match-1-fallback"
source = "match-1"
target = "fallback-provider"
source_handle = "match:fallback"

[[workflow.edges]]
id = "legacy-transform-next"
source = "legacy-transform"
target = "select-chat-model"

[[workflow.edges]]
id = "select-chat-model-next"
source = "select-chat-model"
target = "finalize-response"

[[workflow.edges]]
id = "fallback-provider-next"
source = "fallback-provider"
target = "finalize-response"

[[workflow.edges]]
id = "finalize-response-next"
source = "finalize-response"
target = "end"
